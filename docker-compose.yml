services:

  # ─── PHP / Laravel ───────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: escolar_app
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    networks:
      - escolar_net
    depends_on:
      - db

  # ─── Nginx ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: escolar_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - escolar_net
    depends_on:
      - app

  # ─── MySQL ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: escolar_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-escolar}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-escolar_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - escolar_db_data:/var/lib/mysql
    networks:
      - escolar_net

  # ─── Node / Vite ─────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: escolar_node
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - escolar_net
    depends_on:
      - app

  # ─── phpMyAdmin (opcional, útil en desarrollo) ───────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: escolar_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - escolar_net
    depends_on:
      - db

volumes:
  escolar_db_data:

networks:
  escolar_net:
    driver: bridge
